<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Food Reuse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing-body">
    <nav class="navbar landing-nav">
        <a href="index.html" class="logo" style="text-decoration:none;">
            <i class="fa-solid fa-leaf"></i> Food Reuse
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link" style="color:var(--primary-color);">Contact</a>
            <a href="login.html" class="nav-link" style="margin-left: 1rem;">Log In</a>
            <a href="register.html" class="btn btn-primary">Get Started</a>
        </div>
    </nav>

    <div class="container main-content" style="max-width: 600px; padding-top: 4rem;">
        <div class="card animate-up" style="padding: 3rem; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 style="color: var(--text-color); font-size: 2.5rem; margin-bottom: 0.5rem;">Get In Touch</h1>
                <p class="text-muted">Have a question or want to partner with us? We'd love to hear from you.</p>
            </div>
            
            <form id="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully! We will get back to you within 24 hours.'); this.reset();">
                <div class="form-group">
                    <label>Your Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" required placeholder="E.g. John Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" required placeholder="E.g. john@example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label style="margin-bottom: 0.5rem; display: block; font-weight: 500; color: #34495e;">Message</label>
                    <textarea required placeholder="How can we help?" style="width: 100%; padding: 1.2rem; border: 1px solid #dcdde1; border-radius: 12px; min-height: 150px; font-family: inherit; resize: vertical; outline: none; transition: 0.3s;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="padding: 1rem; font-size: 1.1rem; margin-top: 1rem;"><i class="fa-regular fa-paper-plane"></i> Send Message</button>
            </form>
            
            <div style="margin-top: 3rem; text-align: center; color: #666; font-size: 0.95rem; display: flex; justify-content: space-around; background: #f8f9fc; padding: 1.5rem; border-radius: 12px;">
                <div><i class="fa-solid fa-location-dot" style="color:var(--primary-color); display:block; margin-bottom: 8px; font-size:1.5rem;"></i> Innovation City</div>
                <div><i class="fa-solid fa-envelope" style="color:var(--primary-color); display:block; margin-bottom: 8px; font-size:1.5rem;"></i> hello@foodreuse.org</div>
            </div>
        </div>
    </div>
</body>
</html>
